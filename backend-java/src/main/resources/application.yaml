spring:
  application:
    name: rebyu

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: RebyuHikariPool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: SELECT 1

  flyway:
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true


  websocket:
    message-broker:
      application-destination-prefixes: /app
      topic-prefix: /topic
      queue-prefix: /queue

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

app:

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

resilience4j:
  circuitbreaker:
    instances:
      mlSidecar:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      ragService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
  retry:
    instances:
      mlSidecar:
        max-attempts: 3
        wait-duration: 500ms
      ragService:
        max-attempts: 2
        wait-duration: 1s

logging:
  level:
    root: INFO
    com.capstone.rebyu: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers
  endpoint:
    health:
      show-details: when-authorized

aws:
  s3:
    bucket-name: rebyu
    region: us-east-1
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

langchain4j:
  open-ai:
    api-key: ${GROQ_API_KEY}
    base-url: https://api.groq.com/openai/v1
    chat-model:
      # Groq rate limits are model-specific. Use a lower-cost default so draft generation
      # is less likely to hit the daily token cap during normal authoring workflows.
      model-name: ${GROQ_MODEL:llama-3.1-8b-instant}
      temperature: 0.7

db:
  host: ${HOST}
  port: ${PORT}
  database: ${DATABASE}
