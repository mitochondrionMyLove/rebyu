spring:
  application:
    name: rebyu

  mail:
    host: smtp.gmail.com
    port: 587
    username: nezer.resora@gmail.com
    password: ${GOOGLE_APP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: RebyuHikariPool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-init-sql: SELECT 1

  flyway:
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true


  websocket:
    message-broker:
      application-destination-prefixes: /app
      topic-prefix: /topic
      queue-prefix: /queue

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/us-east-1_YhXCAZ9HF}

app:
  cognito:
    region: ${COGNITO_REGION:us-east-1}
    user-pool-id: ${COGNITO_USER_POOL_ID:us-east-1_YhXCAZ9HF}
  frontend-url: http://localhost:5173
  mail:
    from: nezer.resora@gmail.com

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

resilience4j:
  circuitbreaker:
    instances:
      mlSidecar:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      ragService:
        register-health-indicator: true
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
  retry:
    instances:
      mlSidecar:
        max-attempts: 3
        wait-duration: 500ms
      ragService:
        max-attempts: 2
        wait-duration: 1s

logging:
  level:
    root: INFO
    com.capstone.rebyu: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers
  endpoint:
    health:
      show-details: when-authorized

aws:
  s3:
    bucket-name: rebyu
    region: us-east-1
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

langchain4j:
  open-ai:
    chat-model:
      api-key: ${GITHUB_TOKEN}
      base-url: https://models.github.ai/inference
      model-name: ${GITHUB_MODEL:openai/gpt-4.1-mini}
      temperature: 0.7
      max-tokens: 4096
      timeout: 60s
      log-requests: false
      log-responses: false

db:
  host: ${HOST}
  port: ${PORT}
  database: ${DATABASE}

# Internal FastAPI Bayesian Knowledge Tracing (BKT) service integration.
# The browser never calls FastAPI; only Spring Boot does, over the internal
# network with a shared service key.
bkt:
  enabled: ${BKT_ENABLED:true}
  service-url: ${BKT_SERVICE_URL:http://localhost:8000/api/v1/bkt}
  api-key: ${BKT_SERVICE_API_KEY:}
  connect-timeout-ms: ${BKT_CONNECT_TIMEOUT:2000}
  read-timeout-ms: ${BKT_READ_TIMEOUT:5000}
  dispatch-batch-size: ${BKT_DISPATCH_BATCH_SIZE:100}
  dispatch-interval-ms: ${BKT_DISPATCH_INTERVAL:10000}
  dispatch-initial-delay-ms: ${BKT_DISPATCH_INITIAL_DELAY:15000}
  max-retries: ${BKT_MAX_RETRIES:8}
  retry-initial-delay-seconds: ${BKT_RETRY_INITIAL_DELAY:15}
  retry-max-delay-seconds: ${BKT_RETRY_MAX_DELAY:3600}
  partial-credit-correct-threshold: ${BKT_PARTIAL_CREDIT_CORRECT_THRESHOLD:0.60}
  fallback-assessment-type: ${BKT_FALLBACK_ASSESSMENT_TYPE:LESSON_QUIZ}
  fallback-difficulty: ${BKT_FALLBACK_DIFFICULTY:AVERAGE}

# Judge0 code-execution integration for programming assessment items. Defaults
# to the free, keyless public Judge0 CE instance; set JUDGE0_API_KEY to point
# at a self-hosted or RapidAPI instance instead.
judge0:
  enabled: ${JUDGE0_ENABLED:true}
  base-url: ${JUDGE0_BASE_URL:https://ce.judge0.com}
  api-key: ${JUDGE0_API_KEY:}
  api-key-header: ${JUDGE0_API_KEY_HEADER:X-RapidAPI-Key}
  connect-timeout-ms: ${JUDGE0_CONNECT_TIMEOUT:5000}
  read-timeout-ms: ${JUDGE0_READ_TIMEOUT:20000}
  cpu-time-limit-seconds: ${JUDGE0_CPU_TIME_LIMIT:5}
  memory-limit-kb: ${JUDGE0_MEMORY_LIMIT:128000}
