services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rebyu
      POSTGRES_USER: rebyu
      POSTGRES_PASSWORD: rebyu
    ports:
      - "5432:5432"
    volumes:
      - rebyu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rebyu -d rebyu"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - rebyu_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    env_file: .env
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - rebyu_bkt_artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file: .env
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=1
    volumes:
      - .:/app
      - rebyu_bkt_artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    env_file: .env
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    volumes:
      - .:/app
      - rebyu_bkt_artifacts:/app/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  rebyu_postgres_data:
  rebyu_redis_data:
  rebyu_bkt_artifacts:
